name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      # The verifier/gate is unit-testable without any API key — that's the point.
      - name: Run unit tests (no API key required)
        env:
          PYTHONPATH: src
        run: python -m pytest tests/ -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        # pinned: unpinned ruff drifted to a release enabling rules this
        # codebase was never checked against (147 findings overnight, no
        # code change). Bumping is a deliberate chore, not a CI surprise.
        run: pip install "ruff==0.15.22"
      - name: Lint
        run: ruff check src/ tests/ examples/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy
        run: pip install mypy
      # Scope and settings live in pyproject.toml ([tool.mypy]): the review
      # path only, with the legacy experimental/ subpackage excluded.
      - name: Type check
        run: mypy
